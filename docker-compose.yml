services:

  # ── HuggingFace model servers ─────────────────────────────────────────────

  siebert:
    build:
      context: ./model_server
    environment:
      MODEL_NAME: siebert/sentiment-roberta-large-english
      HF_HOME: /hf_cache
    volumes:
      - hf_cache:/hf_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  cardiffnlp:
    build:
      context: ./model_server
    environment:
      MODEL_NAME: cardiffnlp/twitter-roberta-base-sentiment-latest
      HF_HOME: /hf_cache
    volumes:
      - hf_cache:/hf_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  distilbert:
    build:
      context: ./model_server
    environment:
      MODEL_NAME: lxyuan/distilbert-base-multilingual-cased-sentiments-student
      HF_HOME: /hf_cache
    volumes:
      - hf_cache:/hf_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── vLLM (linux profile only) ─────────────────────────────────────────────

  vllm:
    profiles: [linux]
    build:
      context: ./model_server
      dockerfile: Dockerfile.vllm
    environment:
      HF_HOME: /hf_cache
      VLLM_LOGGING_LEVEL: DEBUG
    volumes:
      - hf_cache:/hf_cache
    ports:
      - "8900:8900"
    command:
      - "--model"
      - "Qwen/Qwen2.5-0.5B-Instruct"
      - "--port"
      - "8900"
      - "--dtype"
      - "float32"
      - "--max-model-len"
      - "2048"
      - "--device"
      - "cpu"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8900/health')"]
      interval: 20s
      timeout: 15s
      retries: 15
      start_period: 300s

  # ── FastAPI backend ───────────────────────────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      VLLM_URL: ${LLM_URL:-http://vllm:8900}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      siebert:
        condition: service_healthy
      cardiffnlp:
        condition: service_healthy
      distilbert:
        condition: service_healthy

  # ── Frontend (nginx) ──────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  # ── Observability ─────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  hf_cache:
    driver: local

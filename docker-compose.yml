# ── Extension templates ────────────────────────────────────────────────────────

x-model-hf: &model-hf
  image: sentiment/model-server:latest
  environment:
    HF_HOME: /hf_cache
  volumes:
    - hf_cache:/hf_cache
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
    interval: 15s
    timeout: 10s
    retries: 10
    start_period: 120s

x-model-zeroshot: &model-zeroshot
  <<: *model-hf
  environment:
    HF_HOME: /hf_cache
    TASK: zero-shot-classification
    CANDIDATE_LABELS: "arms_trafficking,financial_crime,surveillance_operation,human_intelligence,signals_intelligence,covert_operation,money_laundering,sanctions_evasion,recruitment,daily_reporting,network_configuration,routing,administrative,organizational_structure,spatial_context,temporal_reference"
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
    interval: 15s
    timeout: 10s
    retries: 10
    start_period: 240s

x-model-embedding: &model-embedding
  <<: *model-hf
  environment:
    HF_HOME: /hf_cache
    TASK: embedding
    CANDIDATE_LABELS: "arms_trafficking,financial_crime,surveillance_operation,human_intelligence,signals_intelligence,covert_operation,money_laundering,sanctions_evasion,recruitment,daily_reporting,network_configuration,routing,administrative,organizational_structure,spatial_context,temporal_reference"
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
    interval: 15s
    timeout: 10s
    retries: 5
    start_period: 60s

x-model-lexicon: &model-lexicon
  image: sentiment/model-server:latest
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 30s

services:

  # ── Sentiment models ───────────────────────────────────────────────────────

  siebert:
    <<: *model-hf
    profiles: [sentiment]
    build:
      context: ./model_server
    image: sentiment/model-server:latest
    environment:
      MODEL_NAME: siebert/sentiment-roberta-large-english
      HF_HOME: /hf_cache

  cardiffnlp:
    <<: *model-hf
    profiles: [sentiment]
    environment:
      MODEL_NAME: cardiffnlp/twitter-roberta-base-sentiment-latest
      HF_HOME: /hf_cache

  distilbert:
    <<: *model-hf
    profiles: [sentiment]
    environment:
      MODEL_NAME: lxyuan/distilbert-base-multilingual-cased-sentiments-student
      HF_HOME: /hf_cache

  finbert:
    <<: *model-hf
    profiles: [sentiment]
    environment:
      MODEL_NAME: ProsusAI/finbert
      HF_HOME: /hf_cache

  nlptown:
    <<: *model-hf
    profiles: [sentiment]
    environment:
      MODEL_NAME: nlptown/bert-base-multilingual-uncased-sentiment
      HF_HOME: /hf_cache

  nrc:
    <<: *model-lexicon
    profiles: [sentiment]
    environment:
      TASK: nrc

  vader:
    <<: *model-lexicon
    profiles: [sentiment]
    environment:
      TASK: vader

  # ── Topic models — zero-shot NLI ───────────────────────────────────────────

  deberta:
    <<: *model-zeroshot
    profiles: [topic]
    build:
      context: ./model_server
    image: sentiment/model-server:latest
    environment:
      MODEL_NAME: MoritzLaurer/deberta-v3-base-zeroshot-v1
      TASK: zero-shot-classification
      CANDIDATE_LABELS: "arms_trafficking,financial_crime,surveillance_operation,human_intelligence,signals_intelligence,covert_operation,money_laundering,sanctions_evasion,recruitment,daily_reporting,network_configuration,routing,administrative,organizational_structure,spatial_context,temporal_reference"
      HF_HOME: /hf_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 180s

  deberta-large:
    <<: *model-zeroshot
    profiles: [topic]
    environment:
      MODEL_NAME: MoritzLaurer/deberta-v3-large-zeroshot-v2
      TASK: zero-shot-classification
      CANDIDATE_LABELS: "arms_trafficking,financial_crime,surveillance_operation,human_intelligence,signals_intelligence,covert_operation,money_laundering,sanctions_evasion,recruitment,daily_reporting,network_configuration,routing,administrative,organizational_structure,spatial_context,temporal_reference"
      HF_HOME: /hf_cache

  nli-deberta:
    <<: *model-zeroshot
    profiles: [topic]
    environment:
      MODEL_NAME: cross-encoder/nli-deberta-v3-large
      TASK: zero-shot-classification
      CANDIDATE_LABELS: "arms_trafficking,financial_crime,surveillance_operation,human_intelligence,signals_intelligence,covert_operation,money_laundering,sanctions_evasion,recruitment,daily_reporting,network_configuration,routing,administrative,organizational_structure,spatial_context,temporal_reference"
      HF_HOME: /hf_cache

  bart:
    <<: *model-zeroshot
    profiles: [topic]
    environment:
      MODEL_NAME: facebook/bart-large-mnli
      TASK: zero-shot-classification
      CANDIDATE_LABELS: "arms_trafficking,financial_crime,surveillance_operation,human_intelligence,signals_intelligence,covert_operation,money_laundering,sanctions_evasion,recruitment,daily_reporting,network_configuration,routing,administrative,organizational_structure,spatial_context,temporal_reference"
      HF_HOME: /hf_cache

  # ── Topic models — embedding similarity ───────────────────────────────────

  bge-small:
    <<: *model-embedding
    profiles: [topic]
    environment:
      MODEL_NAME: BAAI/bge-small-en-v1.5
      TASK: embedding
      CANDIDATE_LABELS: "arms_trafficking,financial_crime,surveillance_operation,human_intelligence,signals_intelligence,covert_operation,money_laundering,sanctions_evasion,recruitment,daily_reporting,network_configuration,routing,administrative,organizational_structure,spatial_context,temporal_reference"
      HF_HOME: /hf_cache

  bge-large:
    <<: *model-embedding
    profiles: [topic]
    environment:
      MODEL_NAME: BAAI/bge-large-en-v1.5
      TASK: embedding
      CANDIDATE_LABELS: "arms_trafficking,financial_crime,surveillance_operation,human_intelligence,signals_intelligence,covert_operation,money_laundering,sanctions_evasion,recruitment,daily_reporting,network_configuration,routing,administrative,organizational_structure,spatial_context,temporal_reference"
      HF_HOME: /hf_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  minilm:
    <<: *model-embedding
    profiles: [topic]
    environment:
      MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
      TASK: embedding
      CANDIDATE_LABELS: "arms_trafficking,financial_crime,surveillance_operation,human_intelligence,signals_intelligence,covert_operation,money_laundering,sanctions_evasion,recruitment,daily_reporting,network_configuration,routing,administrative,organizational_structure,spatial_context,temporal_reference"
      HF_HOME: /hf_cache

  mpnet:
    <<: *model-embedding
    profiles: [topic]
    environment:
      MODEL_NAME: sentence-transformers/all-mpnet-base-v2
      TASK: embedding
      CANDIDATE_LABELS: "arms_trafficking,financial_crime,surveillance_operation,human_intelligence,signals_intelligence,covert_operation,money_laundering,sanctions_evasion,recruitment,daily_reporting,network_configuration,routing,administrative,organizational_structure,spatial_context,temporal_reference"
      HF_HOME: /hf_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  e5-small:
    <<: *model-embedding
    profiles: [topic]
    environment:
      MODEL_NAME: intfloat/e5-small-v2
      TASK: embedding
      CANDIDATE_LABELS: "arms_trafficking,financial_crime,surveillance_operation,human_intelligence,signals_intelligence,covert_operation,money_laundering,sanctions_evasion,recruitment,daily_reporting,network_configuration,routing,administrative,organizational_structure,spatial_context,temporal_reference"
      HF_HOME: /hf_cache

  e5-large:
    <<: *model-embedding
    profiles: [topic]
    environment:
      MODEL_NAME: intfloat/e5-large-v2
      TASK: embedding
      CANDIDATE_LABELS: "arms_trafficking,financial_crime,surveillance_operation,human_intelligence,signals_intelligence,covert_operation,money_laundering,sanctions_evasion,recruitment,daily_reporting,network_configuration,routing,administrative,organizational_structure,spatial_context,temporal_reference"
      HF_HOME: /hf_cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── vLLM (linux profile only) ─────────────────────────────────────────────

  vllm:
    profiles: [linux]
    build:
      context: ./model_server
      dockerfile: Dockerfile.vllm
    environment:
      HF_HOME: /hf_cache
      VLLM_LOGGING_LEVEL: DEBUG
    volumes:
      - hf_cache:/hf_cache
    ports:
      - "8900:8900"
    command:
      - "--model"
      - "Qwen/Qwen2.5-0.5B-Instruct"
      - "--port"
      - "8900"
      - "--dtype"
      - "float32"
      - "--max-model-len"
      - "2048"
      - "--device"
      - "cpu"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8900/health')"]
      interval: 20s
      timeout: 15s
      retries: 15
      start_period: 300s

  # ── FastAPI backend ───────────────────────────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      VLLM_URL: ${LLM_URL:-http://vllm:8900}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    depends_on:
      siebert:
        condition: service_healthy
      cardiffnlp:
        condition: service_healthy
      distilbert:
        condition: service_healthy
      nrc:
        condition: service_healthy
      vader:
        condition: service_healthy
      finbert:
        condition: service_healthy
      nlptown:
        condition: service_healthy

  # ── Frontend (nginx) ──────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  # ── Observability ─────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.6.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  hf_cache:
    driver: local

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentiment Analysis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 2rem;
      width: 100%;
      max-width: 640px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #111;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #444;
      margin-bottom: 0.4rem;
    }

    select, textarea {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111;
      background: #fff;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.15s;
    }

    select:focus, textarea:focus { border-color: #6366f1; }

    textarea { resize: vertical; min-height: 120px; font-family: inherit; }

    button {
      width: 100%;
      padding: 0.7rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover:not(:disabled) { background: #4f46e5; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }

    #result {
      margin-top: 1.5rem;
      padding: 1rem 1.2rem;
      border-radius: 8px;
      display: none;
    }

    #result.positive { background: #f0fdf4; border: 1px solid #86efac; }
    #result.negative { background: #fef2f2; border: 1px solid #fca5a5; }
    #result.neutral  { background: #f8fafc; border: 1px solid #cbd5e1; }
    #result.error    { background: #fff7ed; border: 1px solid #fdba74; }

    .result-label {
      font-size: 1.25rem;
      font-weight: 700;
      text-transform: capitalize;
    }

    .result-label.positive { color: #16a34a; }
    .result-label.negative { color: #dc2626; }
    .result-label.neutral  { color: #475569; }
    .result-label.error    { color: #ea580c; }

    .result-score {
      font-size: 0.85rem;
      color: #666;
      margin-top: 0.25rem;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sentiment Analysis</h1>

    <label for="model-select">Model</label>
    <select id="model-select">
      <option value="siebert/sentiment-roberta-large-english">siebert/sentiment-roberta-large-english</option>
      <option value="cardiffnlp/twitter-roberta-base-sentiment-latest">cardiffnlp/twitter-roberta-base-sentiment-latest</option>
      <option value="lxyuan/distilbert-base-multilingual-cased-sentiments-student">lxyuan/distilbert-base-multilingual-cased-sentiments-student</option>
      <option value="vllm">vLLM (Qwen2.5-0.5B-Instruct)</option>
    </select>

    <label for="text-input">Text</label>
    <textarea id="text-input" placeholder="Enter text to analyse…"></textarea>

    <button id="submit-btn" onclick="classify()">Analyse</button>

    <div id="result">
      <div class="result-label" id="result-label"></div>
      <div class="result-score" id="result-score"></div>
    </div>
  </div>

  <script>
    async function classify() {
      const model = document.getElementById("model-select").value;
      const text = document.getElementById("text-input").value.trim();
      const btn = document.getElementById("submit-btn");
      const resultDiv = document.getElementById("result");
      const labelEl = document.getElementById("result-label");
      const scoreEl = document.getElementById("result-score");

      if (!text) {
        showResult("error", "Please enter some text.", "");
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Analysing…';
      resultDiv.style.display = "none";

      try {
        const resp = await fetch("/sentiment", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model, text }),
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({ detail: resp.statusText }));
          showResult("error", "Error: " + (err.detail || resp.statusText), "");
          return;
        }

        const data = await resp.json();
        const pct = (data.score * 100).toFixed(1);
        showResult(data.label, data.label, `Confidence: ${pct}% · Model: ${data.model}`);
      } catch (err) {
        showResult("error", "Network error: " + err.message, "");
      } finally {
        btn.disabled = false;
        btn.textContent = "Analyse";
      }
    }

    function showResult(cssClass, label, score) {
      const resultDiv = document.getElementById("result");
      const labelEl = document.getElementById("result-label");
      const scoreEl = document.getElementById("result-score");

      resultDiv.className = cssClass;
      resultDiv.style.display = "block";
      labelEl.className = "result-label " + cssClass;
      labelEl.textContent = label;
      scoreEl.textContent = score;
    }

    // Allow Ctrl+Enter to submit
    document.getElementById("text-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) classify();
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentiment Analysis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 2rem;
      width: 100%;
      max-width: 680px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      color: #111;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #444;
      margin-bottom: 0.4rem;
    }

    textarea {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111;
      background: #fff;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.15s;
      resize: vertical;
      min-height: 120px;
      font-family: inherit;
    }

    textarea:focus { border-color: #6366f1; }

    button {
      width: 100%;
      padding: 0.7rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover:not(:disabled) { background: #4f46e5; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }

    #results {
      margin-top: 1.5rem;
      display: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      text-align: left;
      font-weight: 600;
      color: #555;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0 0.6rem 0.6rem;
      border-bottom: 1px solid #e5e7eb;
    }

    tbody tr + tr td { border-top: 1px solid #f3f4f6; }

    tbody td {
      padding: 0.65rem 0.6rem;
      vertical-align: middle;
    }

    .model-name {
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 0.8rem;
      color: #374151;
      word-break: break-all;
    }

    .label-badge {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: capitalize;
    }

    .label-badge.positive { background: #f0fdf4; color: #16a34a; border: 1px solid #86efac; }
    .label-badge.negative { background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; }
    .label-badge.neutral  { background: #f8fafc; color: #475569; border: 1px solid #cbd5e1; }
    .label-badge.error    { background: #fff7ed; color: #ea580c; border: 1px solid #fdba74; }

    .score { color: #374151; }
    .latency { color: #9ca3af; font-size: 0.82rem; }
    .error-msg { color: #ea580c; font-size: 0.82rem; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sentiment Analysis</h1>

    <label for="text-input">Text</label>
    <textarea id="text-input" placeholder="Enter text to analyse…"></textarea>

    <button id="submit-btn" onclick="analyse()">Analyse</button>

    <div id="results">
      <table>
        <thead>
          <tr>
            <th>Model</th>
            <th>Label</th>
            <th>Confidence</th>
            <th>Latency</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
    </div>
  </div>

  <script>
    async function analyse() {
      const text = document.getElementById("text-input").value.trim();
      const btn = document.getElementById("submit-btn");
      const resultsDiv = document.getElementById("results");
      const tbody = document.getElementById("results-body");

      if (!text) {
        tbody.innerHTML = `<tr><td colspan="4" class="error-msg" style="padding:0.65rem 0.6rem">Please enter some text.</td></tr>`;
        resultsDiv.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Analysing…';
      resultsDiv.style.display = "none";
      tbody.innerHTML = "";

      try {
        const resp = await fetch("/analyse", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({ detail: resp.statusText }));
          tbody.innerHTML = `<tr><td colspan="4" class="error-msg" style="padding:0.65rem 0.6rem">Error: ${err.detail || resp.statusText}</td></tr>`;
          resultsDiv.style.display = "block";
          return;
        }

        const data = await resp.json();
        tbody.innerHTML = data.results.map(r => renderRow(r)).join("");
        resultsDiv.style.display = "block";
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="4" class="error-msg" style="padding:0.65rem 0.6rem">Network error: ${err.message}</td></tr>`;
        resultsDiv.style.display = "block";
      } finally {
        btn.disabled = false;
        btn.textContent = "Analyse";
      }
    }

    function renderRow(r) {
      if (r.error) {
        return `<tr>
          <td><span class="model-name">${r.model}</span></td>
          <td><span class="label-badge error">error</span></td>
          <td colspan="2"><span class="error-msg">${r.error}</span></td>
        </tr>`;
      }
      const pct = (r.score * 100).toFixed(1) + "%";
      const ms = (r.latency_s * 1000).toFixed(0) + " ms";
      return `<tr>
        <td><span class="model-name">${r.model}</span></td>
        <td><span class="label-badge ${r.label}">${r.label}</span></td>
        <td class="score">${pct}</td>
        <td class="latency">${ms}</td>
      </tr>`;
    }

    document.getElementById("text-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) analyse();
    });
  </script>
</body>
</html>

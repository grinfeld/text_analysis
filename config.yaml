models:
  - name: siebert/sentiment-roberta-large-english
    type: ml
    url: http://siebert:8000
    labels:
      POSITIVE: positive
      NEGATIVE: negative

  - name: cardiffnlp/twitter-roberta-base-sentiment-latest
    type: ml
    url: http://cardiffnlp:8000
    labels:
      positive: positive
      neutral: neutral
      negative: negative

  - name: lxyuan/distilbert-base-multilingual-cased-sentiments-student
    type: ml
    url: http://distilbert:8000
    labels:
      positive: positive
      neutral: neutral
      negative: negative

  - name: vader
    type: ml
    url: http://vader:8000
    labels:
      positive: positive
      negative: negative
      neutral: neutral

  - name: ProsusAI/finbert
    type: ml
    url: http://finbert:8000
    labels:
      positive: positive
      negative: negative
      neutral: neutral

  - name: nlptown/bert-base-multilingual-uncased-sentiment
    type: ml
    url: http://nlptown:8000
    labels:
      "1 star": negative
      "2 stars": negative
      "3 stars": neutral
      "4 stars": positive
      "5 stars": positive

  - name: vllm
    type: llm
    url: ${VLLM_URL:-http://localhost:8900}
    model_id: mlx-community/Qwen2.5-0.5B-Instruct-4bit
